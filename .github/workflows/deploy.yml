# .github/workflows/deploy.yml
# Backup: triggers Render deploy via webhook whenever main branch is pushed
# Only needed if render.yaml auto-deploy alone isn't enough
 
name: Deploy to Render
 
on:
  push:
    branches:
      - main          # triggers on every push to main
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json"
        # RENDER_DEPLOY_HOOK_URL is set in GitHub repo Secrets
        # Get the URL from: Render dashboard → your service → Settings → Deploy Hook
