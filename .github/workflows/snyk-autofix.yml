name: Snyk Auto-Fix
# ------------------------------------------------------------------------------
# Scans the repo with Snyk Code on every push to main (and daily), and when
# vulnerabilities are found: Claude fixes them, the build is verified, and the
# fix PR is auto-merged -- which triggers the normal Render deploy.
# No manual intervention needed. If the build fails, the PR is left open for
# review instead of merging, so a bad fix can never reach production.
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 2 * * *" # daily 02:30 UTC safety-net scan
  workflow_dispatch:

# Prevent overlapping runs / infinite loops
concurrency:
  group: snyk-autofix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    # Skip runs triggered by the auto-fix bot's own merge commit
    if: "!contains(github.event.head_commit.message || '', '[snyk-autofix]')"
    runs-on: ubuntu-latest
    outputs:
      issue_count: ${{ steps.count.outputs.issue_count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Snyk
        uses: snyk/actions/setup@master

      - name: Run Snyk Code scan
        run: snyk code test --sarif-file-output=snyk.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Count open issues
        id: count
        run: |
          COUNT=$(jq '[.runs[].results[]] | length' snyk.sarif 2>/dev/null || echo 0)
          echo "issue_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Snyk found $COUNT issue(s)"

      - name: Upload SARIF for the fix job
        if: steps.count.outputs.issue_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sarif
          path: snyk.sarif

  fix:
    needs: scan
    if: needs.scan.outputs.issue_count != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Snyk results
        uses: actions/download-artifact@v4
        with:
          name: snyk-sarif

      - name: Fix vulnerabilities with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The file snyk.sarif in the repo root contains Snyk Code findings
            for this repository. Fix EVERY finding listed in it, one by one.

            Hard rules -- the application must keep working exactly as before:
            1. Make the minimal change that removes each vulnerability. Never
               refactor unrelated code.
            2. Never define a React component inside another component.
            3. Never put JSX outside a function.
            4. package.json must remain strict JSON (no trailing commas).
            5. server/index.ts builds as CommonJS -- never use import.meta.url
               or fileURLToPath there.
            6. Never commit real passwords or secrets. Replace hardcoded
               credentials with environment variables (random fallback so no
               committed literal ever works), replace Math.random()-based IDs
               with crypto APIs, sanitize any HTML rendered from data with
               DOMPurify, and sanitize request data flowing into responses.
            7. If a fix requires a new dependency, add it to package.json.
            8. Do NOT modify snyk.sarif, .github/, or delete any files.

            After fixing, run a syntax sanity check on every file you changed.
          claude_args: "--allowedTools Edit,Write,Read,Glob,Grep,Bash"

      - name: Remove SARIF before committing
        run: rm -f snyk.sarif

      - name: Build gate -- verify the app still compiles
        id: build
        run: |
          npm install --no-audit --no-fund
          npm run build
        continue-on-error: true

      - name: Create fix PR
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: snyk-autofix/${{ github.run_id }}
          commit-message: "fix(security): auto-fix Snyk findings [snyk-autofix]"
          title: "Snyk auto-fix: ${{ needs.scan.outputs.issue_count }} finding(s) resolved"
          body: |
            Automated security fixes for Snyk Code findings.
            Build gate: ${{ steps.build.outcome }}.
            Generated by the snyk-autofix workflow (run ${{ github.run_id }}).

      - name: Auto-merge (only if build passed)
        if: steps.build.outcome == 'success' && steps.pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.pr.outputs.pull-request-number }} --squash

      - name: Flag failed build for review
        if: steps.build.outcome != 'success' && steps.pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.pull-request-number }} \
            --body "WARNING: Build failed after the automated fix -- NOT merged. Review manually before merging."
