services:
  - type: web
    name: controls-dashboard-1
    runtime: node
    region: singapore          # closest to India — change to oregon if preferred
    branch: main               # auto-deploy triggers on every push to this branch
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true           # THIS is what was missing — enables auto-deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        fromService:
          type: web
          name: controls-dashboard-1
          envVarKey: GITHUB_TOKEN  # keep using existing token from Render dashboard
    healthCheckPath: /api/health   # Render pings this to confirm deploy succeeded
